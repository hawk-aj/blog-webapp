AWSTemplateFormatVersion: '2010-09-09'
Description: Portfolio site - EC2 with Python + Node.js

Parameters:
  KeyPairName:
    Type: String
    Default: aarya-base-key-pair

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]

Resources:

  PortfolioSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: portfolio-sg
      GroupDescription: Portfolio site security group
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 8888
          ToPort: 8888
          CidrIp: 0.0.0.0/0
          Description: JupyterLab

  PortfolioInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: ami-0fe1d8d9040df33e6
      KeyName: !Ref KeyPairName
      SecurityGroups:
        - !Ref PortfolioSG
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: portfolio-site
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -e
          dnf update -y

          # Node.js 20
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          dnf install -y nodejs

          # Python pip upgrade
          python3 -m pip install --upgrade pip

          # App directory
          mkdir -p /opt/portfolio
          chown ec2-user:ec2-user /opt/portfolio

          # Signal ready
          touch /var/lib/cloud/instance/setup-complete

Outputs:
  PublicIP:
    Value: !GetAtt PortfolioInstance.PublicIp
    Description: EC2 public IP

  PublicDNS:
    Value: !GetAtt PortfolioInstance.PublicDnsName
    Description: EC2 public DNS

  InstanceId:
    Value: !Ref PortfolioInstance
    Description: EC2 instance ID
